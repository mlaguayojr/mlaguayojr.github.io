<img class="avatar" src="/avatar.jpg" alt="Mario L. Aguayo Jr." />

<div>
  <div class="sidebar-name">{{name}}</div>
  <div class="sidebar-tagline">{{tagline}}</div>
</div>

    {{/links}}
  </ul>
</nav>
