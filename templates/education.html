<div class="education-list">
  {{#education}}
  <div class="education-entry">
    <div class="career-header">
      <span class="career-name">{{institution}}</span>
      <span class="career-duration">{{duration.start}} – {{duration.end}}</span>
    </div>
    <div class="career-title">{{degree}} &middot; {{location}}</div>
    {{#details}}
    <ul class="career-content">
      {{#items}}<li>{{.}}</li>{{/items}}
    </ul>
    {{/details}}
  </div>
  {{/education}}
</div>
